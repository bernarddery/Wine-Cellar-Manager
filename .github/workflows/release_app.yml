name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ZIP custom_components
        run: |
          cd custom_components
          zip wine_cellar_manager.zip -r wine_cellar_manager
          mv wine_cellar_manager.zip ../

      - name: Upload zip to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: wine_cellar_manager.zip
          asset_name: wine_cellar_manager.zip
          tag: ${{ github.ref }}
          overwrite: true
